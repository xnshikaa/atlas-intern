services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_secret
      POSTGRES_DB: atlas_db
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  keycloak-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
      POSTGRES_DB: ${KEYCLOAK_DB_DATABASE:-keycloak_db}
    volumes:
      - keycloak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_DATABASE:-keycloak_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_DATABASE:-keycloak_db}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_PROXY: edge
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - atlas-network

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://atlas:atlas_secret@db:5432/atlas_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.0-flash-exp}
      APPROVED_EMAIL_DOMAINS: ${APPROVED_EMAIL_DOMAINS:-atlasuniversity.edu.in}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-atlas}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-atlas-backend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - atlas-network

  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_TARGET:-dev}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-atlas}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-atlas-frontend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    depends_on:
      - backend
      - keycloak
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/next.config.js:/app/next.config.js:ro
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      # Preserve node_modules from image (don't overwrite)
      - frontend_node_modules:/app/node_modules
      # Preserve .next cache
      - frontend_next:/app/.next
    networks:
      - atlas-network

volumes:
  pgdata:
  keycloak-pgdata:
  frontend_node_modules:
  frontend_next:

networks:
  atlas-network:
    driver: bridge
